kind = "web"
previewPath = "/padcom"
title = "PADCOM Anamnese"
version = "1.0.0"
id = "artifacts/padcom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/padcom" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/padcom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/padcom", "run", "build" ]
publicDir = "artifacts/padcom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/padcom"
